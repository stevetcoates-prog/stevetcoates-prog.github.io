<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Timeline ❤️</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    color:#ff7eb9;
    margin-top:40px;
    margin-bottom:25px;
    font-size:42px;
}

.timer{
    background:#1d1d1d;
    max-width:550px;
    margin:20px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,.08);
}

.timer h2{
    margin-top:0;
    color:#ffd166;
}

.time{
    font-size:28px;
    line-height:1.6;
}

.since{
    color:#aaa;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<h1>❤️ Timeline ❤️</h1>

<div id="loveStory"></div>

<h1>👶 Our Bundles of Joy 👶</h1>

<div id="kids"></div>

<script>

const loveStory = [
{
    title:"Since we started talking",
    date:"2011-06-11T13:00:00"
},
{
    title:"First time I said I love you",
    date:"2011-08-12T22:30:00"
},
{
    title:"Proposal",
    date:"2012-07-18T18:00:00"
}
];

const kids = [
{
    title:"Brooklynn",
    date:"2008-06-03T09:11:00"
},
{
    title:"Logan",
    date:"2015-08-01T10:29:00"
}
];

function renderTimers(list, elementId){

    const container=document.getElementById(elementId);
    container.innerHTML="";

    list.forEach(event=>{

        const startDate=new Date(event.date);
        const now=new Date();

        let diff=now-startDate;

        const days=Math.floor(diff/(1000*60*60*24));
        diff%=1000*60*60*24;

        const hours=Math.floor(diff/(1000*60*60));
        diff%=1000*60*60;

        const minutes=Math.floor(diff/(1000*60));
        diff%=1000*60;

        const seconds=Math.floor(diff/1000);

        container.innerHTML += `
        <div class="timer">
            <h2>${event.title}</h2>

            <div class="time">
                ${days.toLocaleString()} Days<br>
                ${hours} Hours<br>
                ${minutes} Minutes<br>
                ${seconds} Seconds
            </div>

            <div class="since">
                Since ${startDate.toLocaleString()}
            </div>
        </div>
        `;
    });
}

function update(){
    renderTimers(loveStory,"loveStory");
    renderTimers(kids,"kids");
}

update();
setInterval(update,1000);

</script>

</body>
</html>
